name: Retell AI
kind: company
description: >-
  Retell AI provides voice AI infrastructure for building conversational agents with
  low-latency turn detection, interruption handling, tool calling, knowledge bases, and
  conversation flows. The Retell SDK exposes a published OpenAPI spec covering agents,
  calls, voices, knowledge bases, conversation flows, batches, and chat agents.
