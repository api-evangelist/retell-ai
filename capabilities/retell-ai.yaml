      path: /add-community-voice
      operations:
      - name: addcommunityvoice
        method: POST
        description: Add a community voice to the voice library
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: add-knowledge-base-sources-knowledge_base_id
      path: /add-knowledge-base-sources/{knowledge_base_id}
      operations:
      - name: addknowledgebasesources
        method: POST
