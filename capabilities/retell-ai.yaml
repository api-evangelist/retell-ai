        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: knowledge_base_id
          in: path
          type: string
          description: The knowledge base id to delete source from.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
