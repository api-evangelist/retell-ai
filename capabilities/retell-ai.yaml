    - name: list-agents
      path: /list-agents
      operations:
      - name: listagents
        method: GET
        description: List all agents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 1000, and the default
            is 1000.
        - name: pagination_key
          in: query
          type: string
          description: 'The pagination key to continue fetching the next page of agents. Pagination key is represented by
            a agent id, pagination key and version pair is exclusive (not '
        - name: pagination_key_version
          in: query
          type: integer
          description: Specifies the version of the agent associated with the pagination_key. When paginating, both the pagination_key
            and its version must be provided to ensure consi
        - name: is_latest
          in: query
          type: boolean
          description: If true, only return the latest version of each agent.
    - name: list-batch-tests
