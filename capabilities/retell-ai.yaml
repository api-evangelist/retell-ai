naftiko: 1.0.0-alpha2
info:
  label: Retell SDK
  description: 'Retell SDK. 86 operations. Lead operation: Retell SDK. Self-contained Naftiko capability covering one Retell
    Ai business surface.'
  tags:
  - Retell Ai
  - Retell SDK
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
