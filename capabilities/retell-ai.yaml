      operations:
      - name: agentplaygroundcompletion
        method: POST
        description: Stateless playground completion. Send the full conversation history (same shape as chat completion messages)
          and receive only the newly generated messages. Nothing is persisted server-side — the caller manages conversation
          state.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: agent_id
          in: path
          type: string
          description: Unique id of the agent.
          required: true
        - name: version
          in: query
          type: integer
          description: Agent version to use. Defaults to latest.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: clone-voice
